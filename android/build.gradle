allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

subprojects { sub ->
    if (sub.state.executed) {
        if (sub.hasProperty('android')) {
            sub.android {
                if (namespace == null) {
                    namespace sub.group
                }
            }
        }
    } else {
        sub.afterEvaluate {
            if (sub.hasProperty('android')) {
                sub.android {
                    if (namespace == null) {
                        namespace sub.group
                    }
                }
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
